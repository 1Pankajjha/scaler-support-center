<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Scaler Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
        }
        
        .logo svg {
            width: 40px;
            height: 40px;
        }
        
        .logo h1 {
            font-size: 1.5rem;
            color: #1e40af;
        }
        
        h2 {
            font-size: 1.75rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #64748b;
            margin-bottom: 2rem;
        }
        
        .google-btn {
            width: 100%;
            padding: 0.875rem 1rem;
            background-color: white;
            color: #374151;
            border: 1px solid #d1d5db;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .google-btn:hover {
            background-color: #f9fafb;
            border-color: #9ca3af;
        }
        
        .debug-btn {
            width: 100%;
            padding: 0.875rem 1rem;
            background-color: #1e40af;
            color: white;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }
        
        .debug-btn:hover {
            background-color: #1e3a8a;
        }
        
        .error {
            color: #dc2626;
            background-color: #fef2f2;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-bottom: 1.5rem;
            border-left: 3px solid #dc2626;
            display: none;
        }
        
        .info {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            padding: 1rem;
            border-radius: 0;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #0c4a6e;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7L12 12L22 7L12 2Z"></path>
                <path d="M2 17L12 22L22 17"></path>
                <path d="M2 12L12 17L22 12"></path>
            </svg>
            <h1>Scaler</h1>
        </div>
        
        <h2>Admin Login</h2>
        <p class="subtitle">Sign in with your Scaler email to access the admin panel</p>
        
        <div id="error" class="error"></div>
        
        <button class="google-btn" onclick="loginWithGoogle()">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </button>
        
        <button class="debug-btn" onclick="debugLogin()">Debug Login (Bypass)</button>
        
        <div class="info">
            <strong>Note:</strong> You need a @scaler.com or @interviewbit.com email address to access the admin panel.
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        async function loginWithGoogle() {
            try {
                // In a real implementation, you would use Google's GSI library
                // For now, we'll show an error message
                showError('Google OAuth integration needs to be configured. Please use the debug login for testing.');
            } catch (error) {
                showError('Login failed. Please try again.');
            }
        }
        
        async function debugLogin() {
            try {
                const response = await fetch(`${API_BASE}/api/auth/google`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: 'DEBUG_BYPASS_TOKEN'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin';
                } else {
                    showError('Login failed. Please check your credentials.');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
